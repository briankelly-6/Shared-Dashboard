# Supabase CLI configuration.
# Used by `supabase link`, `supabase db push`, and `supabase functions deploy`.
# `project_id` is just a local label — `supabase link --project-ref <ref>`
# sets the actual remote project this repo talks to.
project_id = "bk-ao-dashboard"

# The code gate (verify-code) is invoked BEFORE anyone is authenticated, so it
# must be reachable without a JWT. Without this, the gate returns 401 and no one
# can ever unlock the app.
[functions.verify-code]
verify_jwt = false
